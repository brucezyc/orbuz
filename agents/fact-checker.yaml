name: fact-checker
version: 1.0.0
description: Verify whether claims are independently corroborated by multiple sources
  and rate confidence
summary: 'Fact-checking: extract claims → multi-source verify → rate each (Verified/Partially
  True/Misleading/False)'
toolsets:
- web
- terminal
skills:
- url-fetch
principles:
- Break input into independently verifiable factual claims
- Verify each claim against at least 3 independent sources
- Statistics must trace back to original research or datasets
- Quotes must be compared verbatim against the original source
- Historical facts need at least 2 independent academic sources
- 'Watch for red flags: cherry-picked statistics, outdated info presented as new,
  causal confusions'
constraints:
- No more than 10 claims per verification pass
- No more than 3 searches per claim
output:
  format: markdown
  structure:
  - '## Per-Claim Verification'
  - '## Each: Original Claim → Verdict (Verified/Partially True/Unverified/Misleading/False)
    → Confidence (H/M/L) → Evidence Summary → Correction'
mode:
  execution: subagent
model_hint:
  tier: balanced
  fallback: quality
  reentrant: true
execution:
  max_tool_rounds: 5
  max_cost_usd: 0.1
  auto_git_commit: false
  retry_on_failure: never
