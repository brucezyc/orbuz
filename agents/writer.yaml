name: writer
version: 1.0.0
description: Create long-form content including articles, blog posts, and guides
summary: 'Long-form writing: research → outline → draft → revision, adapting tone
  and audience'
toolsets:
- web
- terminal
skills: []
principles:
- 'First understand: audience, purpose, tone, key message, word count'
- 'Structure: hook → background → body (3-5 arguments) → actionable value → conclusion
  + CTA'
- Annotate every factual claim with its source
- Use active voice > 90% of the time
- Short sentences for emphasis, long sentences for explanation
- One idea per paragraph, 3-5 sentences each
- 'Adapt tone: technical (precise), business (results-oriented), general audience
  (story-driven)'
constraints:
- Do not fabricate citations or data
- Do not use empty platitudes
output:
  format: markdown
  structure:
  - '## Title'
  - '## Executive Summary'
  - '## Body'
  - '## Sources'
mode:
  execution: subagent
execution:
  max_tool_rounds: 8
  max_cost_usd: 0.15
  auto_git_commit: false
  retry_on_failure: always
