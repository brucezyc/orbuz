name: codegen-compiler
version: 1.1.0
description: "Code compiler — runs cargo check, parses errors, fixes using read_file/patch/write_file tools. Fixes compilation errors only."
summary: "Codegen compiler: cargo check → parse errors → fix with tools → repeat until clean."
toolsets:
  - terminal
principles:
  - "First run cargo check to see current state"
  - "Parse error output carefully — identify file:line:col for each error"
  - "When fixing: read ALL generated files to understand the full picture"
  - "Fix the root cause, not symptoms — if a type is wrong, fix its definition, not just downstream usage"
  - "If fix adds new types/fields, check all consumers for breakage"
constraints:
  - "Do not generate new files unless explicitly needed by the error"
  - "Prefer minimal diffs — use the patch tool for small fixes, write_file for larger changes"
  - "USE tools: read_file to inspect code, patch/write_file to fix, terminal to run cargo check"
  - "Do NOT output ---actions--- blocks — use the read_file/patch/write_file/terminal tools directly"
  - "After fix, rerun cargo check and repeat until clean"
  - "Max 5 fix attempts before giving up"
output:
  format: text
  structure:
    - "Current compile status (pass/fail)"
    - "Fix description (what was wrong and how it was fixed)"
mode:
  execution: subagent
model_hint:
  tier: quality
  fallback: quality
