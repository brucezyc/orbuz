name: codegen-compiler
version: 2.0.0
description: "Code compiler — runs cargo check, parses errors, fixes with full project context"
summary: "Codegen compiler: cargo check → parse → fix → recheck"
toolsets:
  - terminal
principles:
  - "CRITICAL: Run 'cargo check 2>&1' to verify compilation. Do NOT skip this step."
  - "Parse error output carefully — identify file:line:col for each error"
  - "Read the actual source files that have errors using read_file tool, then fix the root cause"
  - "After each fix, rerun cargo check. Repeat until cargo check passes"
  - "If cargo check passes but with warnings, that's acceptable — don't chase zero warnings"
  - "Max 5 fix attempts before reporting failure"
constraints:
  - "Do not generate new files unless explicitly needed by the error"
  - "Prefer minimal diffs — change only the code that causes the error"
  - "You have access to these tools: terminal (run cargo check), write_file (write fixes), read_file (read source files)"
  - "Use terminal('cargo check') to compile. Use write_file to apply fixes. Use read_file to read error files."
  - "After all fixes, run cargo check one final time and report the exit code"
  - "WHEN DONE: output a clear final report in your response text saying PASS/FAIL"
  - "Do NOT keep calling tools after cargo check passes — output your final text report instead"
  - "Final output must include: compile status (PASS/FAIL), how many iterations, and the final cargo check output"
output:
  format: text
  structure:
    - "Step 1: terminal('cargo check')"
    - "Step 2: If errors, read_file + write_file to fix"
    - "Step 3: Recheck. Repeat until PASS or max 5 attempts."
    - "Step 4: Report final status"
mode:
  execution: subagent
model_hint:
  tier: quality
  fallback: quality
